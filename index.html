<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terns Exim – Dhivya Prakash</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
    }

    /* ── Banner image ── */
    #banner {
      display: block;
      width: 100%;
      line-height: 0;
    }

    #banner img {
      display: block;
      width: 100%;
    }

    /* Mobile default: portrait image, full viewport height */
    #img-mobile  { display: block; height: 100svh; object-fit: cover; object-position: top center; }
    #img-desktop { display: none; }

    /* Desktop (≥768px): landscape image, full viewport height */
    @media (min-width: 768px) {
      #img-mobile  { display: none; }
      #img-desktop { display: block; height: 100vh; object-fit: cover; object-position: center; }
    }

    /* ── Buttons section ── */
    #cta {
      background: #0a0a0a;
      padding: 40px 20px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .gold-label {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: #c9a84c;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .gold-line {
      width: 160px;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, #c9a84c 50%, transparent 100%);
      margin-bottom: 8px;
    }

    .btn-gold {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
      max-width: 420px;
      padding: 16px 32px;
      border-radius: 3px;
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #0a0a0a;
      background: linear-gradient(135deg, #f5e08a 0%, #c9a84c 45%, #8c6a1a 100%);
      border: 1px solid #f0d080;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 2px 20px rgba(201,168,76,0.4);
    }

    /* Shine overlay */
    .btn-gold::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: rgba(255,255,255,0.18);
      pointer-events: none;
    }

    .btn-gold:hover {
      transform: translateY(-3px);
      filter: brightness(1.12);
      box-shadow: 0 8px 30px rgba(201,168,76,0.65);
    }

    .btn-gold:active {
      transform: translateY(0px);
      filter: brightness(0.94);
    }

    .btn-gold svg {
      width: 22px;
      height: 22px;
      fill: #0a0a0a;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .btn-gold span {
      position: relative;
      z-index: 1;
    }

    .footer-tag {
      margin-top: 24px;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(201,168,76,0.35);
      text-transform: uppercase;
    }

    /* Device badge (just for fun, bottom of page) */
    #device-tag {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(201,168,76,0.2);
      text-transform: uppercase;
      margin-top: 6px;
    }
  </style>
</head>
<body>

  <!-- BANNER: JS will set which to show based on device detection -->
  <div id="banner">
    <img id="img-mobile"
         src="ChatGPT_Image_May_14__2026__05_34_30_PM.png"
         alt="Terns Exim – Dhivya Prakash – Mobile" />
    <img id="img-desktop"
         src="ChatGPT_Image_May_15__2026__08_32_53_AM.png"
         alt="Terns Exim – Dhivya Prakash – Desktop" />
  </div>

  <!-- BUTTONS -->
  <section id="cta">

    <p class="gold-label">Connect with us</p>
    <div class="gold-line"></div>

    <p class="footer-tag">Terns Exim &nbsp;·&nbsp; Global Trade Partners</p>
    <p id="device-tag"></p>

  </section>

  <script>
    /* ── Device detection via User-Agent + screen width ── */
    (function () {
      var ua = navigator.userAgent || '';
      var isMobileUA = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
      var isNarrow   = window.innerWidth < 768;
      var isMobile   = isMobileUA || isNarrow;

      var mob  = document.getElementById('img-mobile');
      var desk = document.getElementById('img-desktop');
      var tag  = document.getElementById('device-tag');

      if (isMobile) {
        mob.style.display  = 'block';
        desk.style.display = 'none';
        tag.textContent    = '· mobile view ·';
      } else {
        mob.style.display  = 'none';
        desk.style.display = 'block';
        tag.textContent    = '· desktop view ·';
      }

      /* Re-check on resize (e.g. browser window drag) */
      window.addEventListener('resize', function () {
        var nowNarrow = window.innerWidth < 768;
        if (nowNarrow) {
          mob.style.display  = 'block';
          desk.style.display = 'none';
          tag.textContent    = '· mobile view ·';
        } else {
          mob.style.display  = 'none';
          desk.style.display = 'block';
          tag.textContent    = '· desktop view ·';
        }
      });
    })();
  </script>

</body>
</html>
